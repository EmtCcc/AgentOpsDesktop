name: Deploy

on:
  workflow_run:
    workflows: ["CI", "SAST"]
    branches: [main]
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-gates:
    runs-on: ubuntu-latest
    outputs:
      ci: ${{ steps.check.outputs.ci }}
      sast: ${{ steps.check.outputs.sast }}
    steps:
      - name: Check workflow results
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const sha = context.payload.workflow_run.head_sha;

            // Check CI workflow
            const ciRuns = await github.rest.actions.listWorkflowRunsForRepo({
              owner, repo, head_sha: sha, event: 'push'
            });
            const ciRun = ciRuns.data.workflow_runs.find(r => r.name === 'CI');
            const ciSuccess = ciRun?.conclusion === 'success';
            core.setOutput('ci', ciSuccess.toString());

            // Check SAST workflow
            const sastRun = ciRuns.data.workflow_runs.find(r => r.name === 'SAST');
            const sastSuccess = sastRun?.conclusion === 'success';
            core.setOutput('sast', sastSuccess.toString());

            if (!ciSuccess || !sastSuccess) {
              core.setFailed(`Deployment gates failed: CI=${ciSuccess}, SAST=${sastSuccess}`);
            }

  release:
    needs: check-gates
    if: ${{ needs.check-gates.outputs.ci == 'true' && needs.check-gates.outputs.sast == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        include:
          - os: macos-latest
            platform: mac
            artifact_name: AgentOps-mac
          - os: ubuntu-latest
            platform: linux
            artifact_name: AgentOps-linux
          - os: windows-latest
            platform: win
            artifact_name: AgentOps-win

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Build and Publish
        run: node scripts/build.js && npx electron-builder --${{ matrix.platform }} --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple notarization (only for macOS)
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.artifact_name }}
          path: release/
          retention-days: 7

  smoke-test:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Wait for release to be available
        run: sleep 30

      - name: Run deployment smoke tests
        run: node scripts/deploy-smoke-test.js
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
