name: Rollback Release

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: 'Version to roll back to (e.g. v0.1.0). Must be an existing git tag with a GitHub Release.'
        required: true
        type: string
      reason:
        description: 'Reason for rollback (for release notes)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  rollback:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Import Apple certificate
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo "$CSC_LINK" | base64 --decode > "$CERTIFICATE_PATH"
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 24)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build DMGs from ${{ inputs.target_version }}
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          npx electron-builder --mac --publish never

      - name: Re-publish to ${{ inputs.target_version }} release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ inputs.target_version }}"

          # Remove old DMG assets from the release (ignore if absent)
          gh release delete-asset "$TAG" "AgentOps-$(node -p "require('./package.json').version").dmg" --yes 2>/dev/null || true
          gh release delete-asset "$TAG" "AgentOps-$(node -p "require('./package.json').version")-arm64.dmg" --yes 2>/dev/null || true
          gh release delete-asset "$TAG" "latest-mac.yml" --yes 2>/dev/null || true

          # Upload fresh build artifacts
          gh release upload "$TAG" release/AgentOps-*.dmg release/latest-mac.yml --clobber

          # Mark the release as latest (re-triggers electron-updater)
          gh release edit "$TAG" --latest --notes "## Rollback Release

          **Rolled back to:** ${{ inputs.target_version }}
          **Reason:** ${{ inputs.reason }}
          **Rollback date:** $(date -u +%Y-%m-%dT%H:%M:%SZ)

          This release has been re-published from ${{ inputs.target_version }}.
          electron-updater clients will auto-update to this version on next launch."

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
