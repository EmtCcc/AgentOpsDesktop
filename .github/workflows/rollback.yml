name: Rollback Release

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: 'Version to roll back to (e.g. v0.1.0). Must be an existing git tag.'
        required: true
        type: string
      reason:
        description: 'Reason for rollback (for release notes)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  rollback:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_version }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm install

      - name: Import Apple certificate
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo "$CSC_LINK" | base64 --decode > "$CERTIFICATE_PATH"
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 24)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build and re-publish ${{ inputs.target_version }}
        env:
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx electron-builder --mac --publish always

      - name: Tag rollback release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ROLLBACK_TAG="rollback-$(date +%Y%m%d-%H%M%S)"
          VERSION=$(node -p "require('./package.json').version")

          # Create a release note documenting the rollback
          gh release create "$ROLLBACK_TAG" \
            --title "Rollback to ${VERSION}" \
            --notes "## Rollback

          **Rolled back to:** ${{ inputs.target_version }}
          **Reason:** ${{ inputs.reason }}

          This release re-publishes ${VERSION} as the latest stable version.
          electron-updater clients will auto-update to this version on next launch." \
            --latest

      - name: Clean up keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
