name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - name: Run unit tests
        run: npx vitest run --reporter=default --reporter=junit --outputFile=test-results/junit.xml
      - name: API smoke test
        run: npm run test:smoke:api
      - name: Test summary
        if: always()
        run: |
          if [ -f test-results/junit.xml ]; then
            TOTAL=$(grep -c '<testcase ' test-results/junit.xml || echo 0)
            FAILURES=$(grep -c '<failure' test-results/junit.xml || echo 0)
            ERRORS=$(grep -c '<error' test-results/junit.xml || echo 0)
            PASS=$((TOTAL - FAILURES - ERRORS))
            echo "## Test Results" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASS |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| Total  | $TOTAL |" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Test Results" >> $GITHUB_STEP_SUMMARY
            echo "No test results generated." >> $GITHUB_STEP_SUMMARY
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx playwright install --with-deps
      - run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            artifact: release/*.dmg
            artifact_name: AgentOps-mac
          - os: windows-latest
            platform: win
            artifact: release/*.exe
            artifact_name: AgentOps-win
          - os: ubuntu-latest
            platform: linux
            artifact: release/*.AppImage
            artifact_name: AgentOps-linux
    runs-on: ${{ matrix.os }}
    needs: [lint, test, e2e]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run package:${{ matrix.platform }}
      - run: npm run test:smoke
        if: matrix.platform == 'mac'
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact }}
          retention-days: 30
