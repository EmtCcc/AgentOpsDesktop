<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; script-src 'self';">
  <title>AgentOps</title>
  <meta name="color-scheme" content="light dark">
  <link rel="preload" href="styles/tokens.css" as="style">
  <link rel="preload" href="styles/base.css" as="style">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/base.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/pages.css">
</head>
<body>
  <div class="app" id="app">

    <!-- ── Header ── -->
    <header class="header titlebar-drag" data-testid="header">
      <div class="header__left">
        <button class="header__toggle" id="sidebar-toggle" title="Toggle sidebar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <div class="header__logo">
          <div class="header__logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="6" y="14" width="12" height="8" rx="2" ry="2"/><path d="M12 16v4"/></svg>
          </div>
          <div>
            <div class="header__title">AgentOps</div>
            <div class="header__subtitle">Desktop</div>
          </div>
        </div>
      </div>

      <div class="header__center">
        <div class="header__search">
          <svg class="header__search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" class="header__search-input" placeholder="Search... (⌘K)" id="global-search">
        </div>
      </div>

      <div class="header__right">
        <button class="header__action" title="Notifications" id="btn-notifications">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
          <span class="header__action-badge"></span>
        </button>

        <button class="header__action" title="Settings" data-page="settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>

        <div class="header__divider"></div>

        <div class="header__user" id="user-menu">
          <div class="header__avatar">AO</div>
          <div class="header__user-info">
            <div class="header__user-name">AgentOps</div>
            <div class="header__user-role">Admin</div>
          </div>
        </div>
      </div>
    </header>

    <!-- ── Sidebar ── -->
    <nav class="sidebar" id="sidebar" data-testid="sidebar">
      <div class="sidebar__section">
        <div class="sidebar__section-title">Overview</div>
        <a class="sidebar__item sidebar__item--active" data-page="dashboard">
          <span class="sidebar__item-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </span>
          <span class="sidebar__label">Dashboard</span>
        </a>
        <a class="sidebar__item" data-page="landing">
          <span class="sidebar__item-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </span>
          <span class="sidebar__label">Home</span>
        </a>
      </div>

      <div class="sidebar__section">
        <div class="sidebar__section-title">Operations</div>
        <a class="sidebar__item" data-page="agents">
          <span class="sidebar__item-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="6" y="14" width="12" height="8" rx="2" ry="2"/><path d="M12 16v4"/></svg>
          </span>
          <span class="sidebar__label">Agents</span>
          <span class="sidebar__item-badge" id="agent-count">0</span>
        </a>
        <a class="sidebar__item" data-page="tasks">
          <span class="sidebar__item-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </span>
          <span class="sidebar__label">Tasks</span>
          <span class="sidebar__item-badge" id="task-count">0</span>
        </a>
        <a class="sidebar__item" data-page="logs">
          <span class="sidebar__item-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>
          </span>
          <span class="sidebar__label">Logs</span>
        </a>
      </div>

      <div class="sidebar__section">
        <div class="sidebar__section-title">Workspace</div>
        <a class="sidebar__item" data-page="squads">
          <span class="sidebar__item-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          </span>
          <span class="sidebar__label">Squads</span>
        </a>
        <a class="sidebar__item" data-page="workflows">
          <span class="sidebar__item-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>
          </span>
          <span class="sidebar__label">Workflows</span>
        </a>
      </div>

      <div class="sidebar__spacer"></div>

      <div class="sidebar__footer">
        <a class="sidebar__item" data-page="settings">
          <span class="sidebar__item-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </span>
          <span class="sidebar__label">Settings</span>
        </a>

        <div class="sidebar__user">
          <div class="sidebar__user-avatar">AO</div>
          <div class="sidebar__user-info">
            <div class="sidebar__user-name">AgentOps</div>
            <div class="sidebar__user-status">v0.1.0</div>
          </div>
        </div>
      </div>
    </nav>

    <!-- ── Main Content ── -->
    <main class="main" id="main-content" data-testid="main-content">
      <!-- Pages rendered by JS -->
    </main>

    <!-- ── Footer / Status Bar ── -->
    <footer class="footer" data-testid="footer">
      <div class="footer__left">
        <div class="footer__status">
          <span class="footer__dot footer__dot--running" id="footer-status-dot"></span>
          <span id="footer-status-text">System ready</span>
        </div>
        <div class="footer__divider"></div>
        <div class="footer__item">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="6" y="14" width="12" height="8" rx="2" ry="2"/><path d="M12 16v4"/></svg>
          <span id="footer-agent-count">0 agents</span>
        </div>
      </div>
      <div class="footer__right">
        <span id="footer-task-count">0 tasks</span>
        <div class="footer__divider"></div>
        <span>v0.1.0</span>
      </div>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
