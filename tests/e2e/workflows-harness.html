<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgentOps Desktop — Workflows</title>
  <link rel="stylesheet" href="../../src/renderer/styles/tokens.css">
  <link rel="stylesheet" href="../../src/renderer/styles/base.css">
  <link rel="stylesheet" href="../../src/renderer/styles/layout.css">
  <link rel="stylesheet" href="../../src/renderer/styles/components.css">
  <link rel="stylesheet" href="../../src/renderer/styles/pages.css">
</head>
<body>
  <div class="app" id="app">
    <header class="header" data-testid="header">
      <div class="header__left">
        <div class="header__logo">
          <div class="header__logo-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8V4H8"/><rect x="2" y="2" width="20" height="8" rx="2" ry="2"/><rect x="6" y="14" width="12" height="8" rx="2" ry="2"/><path d="M12 16v4"/></svg>
          </div>
          <div>
            <div class="header__title">AgentOps</div>
            <div class="header__subtitle">Desktop</div>
          </div>
        </div>
      </div>
    </header>

    <nav class="sidebar" data-testid="sidebar">
      <div class="sidebar__section">
        <div class="sidebar__section-title">Overview</div>
        <a class="sidebar__item" data-page="dashboard">
          <span class="sidebar__item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
          <span class="sidebar__label">Dashboard</span>
        </a>
      </div>
      <div class="sidebar__section">
        <div class="sidebar__section-title">Workspace</div>
        <a class="sidebar__item sidebar__item--active" data-page="workflows">
          <span class="sidebar__item-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
          <span class="sidebar__label">Workflows</span>
        </a>
      </div>
    </nav>

    <main class="main" data-testid="main-content">
      <div class="page-header">
        <div>
          <h1 class="page-header__title">Workflows</h1>
          <p class="page-header__desc">Pipeline orchestration</p>
        </div>
      </div>

      <div class="empty-state" id="workflow-empty">
        <div class="empty-state__icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </div>
        <h2 class="empty-state__title">No workflows configured</h2>
        <p class="empty-state__desc">Create a workflow to orchestrate multi-agent pipelines</p>
        <div class="empty-state__actions">
          <button class="btn btn--primary" id="btn-create-workflow">Create workflow</button>
          <button class="btn btn--secondary">Learn more</button>
        </div>
      </div>
    </main>

    <footer class="footer" data-testid="footer">
      <div class="footer__left">
        <div class="footer__status">
          <span class="footer__dot footer__dot--running"></span>
          <span>System ready</span>
        </div>
      </div>
      <div class="footer__right">
        <span>v0.1.0</span>
      </div>
    </footer>
  </div>
</body>
</html>
