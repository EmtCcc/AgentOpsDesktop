<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AgentOps Desktop — API Documentation</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; }
    .topbar { display: none; }
    .swagger-ui .info { margin: 20px 0; }
    .swagger-ui .info .title { color: #e6edf3; }
    .swagger-ui .info .description p { color: #b1bac4; }
    .swagger-ui .scheme-container { background: #161b22; box-shadow: none; }
    .swagger-ui .opblock-tag { color: #e6edf3; border-bottom-color: #30363d; }
    .swagger-ui .opblock .opblock-summary-description { color: #b1bac4; }
    .swagger-ui .model-box { background: #161b22; }
    .swagger-ui .topbar { display: none; }
    .header {
      background: linear-gradient(135deg, #1a1040 0%, #0d1117 100%);
      padding: 24px 40px;
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header h1 { color: #e6edf3; font-size: 20px; font-weight: 600; }
    .header .badge {
      background: #238636;
      color: #fff;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .header .transport {
      color: #8b949e;
      font-size: 13px;
      margin-left: auto;
    }
    .header code {
      background: #1c2128;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      color: #79c0ff;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AgentOps Desktop</h1>
    <span class="badge">IPC + HTTP</span>
    <span class="transport">HTTP: <code>http://localhost:3967</code> &nbsp;|&nbsp; IPC: <code>window.agentOps.*</code></span>
  </div>
  <div id="swagger-ui"></div>
  <script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    const spec = {
  "openapi": "3.0.3",
  "info": {
    "title": "AgentOps Desktop API",
    "description": "API for AgentOps Desktop — an Electron application for managing AI agent sessions, goals, tasks, and DAG workflows.\n\n**Transport layers:**\n- **Electron IPC** — primary interface for the renderer process via `window.agentOps.*`\n- **HTTP REST** — secondary interface on port 3967 for external tools and scripts\n\n**Authentication:** Bearer token obtained from `POST /auth/login`. Include as `Authorization: Bearer <token>` for HTTP, or pass `_auth: { token }` in the IPC payload.\n\nEach IPC operation maps to a channel (listed in `x-ipc-channel`). The HTTP API mirrors the same operations at REST paths.",
    "version": "0.1.0",
    "contact": {
      "name": "AgentOps Team"
    },
    "license": {
      "name": "UNLICENSED"
    }
  },
  "servers": [
    {
      "url": "http://localhost:3967",
      "description": "HTTP REST API (Hono)"
    },
    {
      "url": "ipc://localhost",
      "description": "Electron IPC transport"
    }
  ],
  "tags": [
    {
      "name": "Auth",
      "description": "Session management — login, logout, token rotation, status check"
    },
    {
      "name": "Monitoring",
      "description": "Health checks and system diagnostics"
    },
    {
      "name": "Agents",
      "description": "Agent configuration CRUD — register, update, delete agent configs"
    },
    {
      "name": "Agent Processes",
      "description": "Live agent process management — spawn, kill, poll status"
    },
    {
      "name": "Goals",
      "description": "Goal management — group tasks under strategic objectives"
    },
    {
      "name": "Tasks",
      "description": "Task management — create, assign, track work items linked to goals"
    },
    {
      "name": "Orchestrator",
      "description": "DAG workflow engine — define, execute, and monitor multi-step workflows"
    },
    {
      "name": "Logs",
      "description": "Log entry management — append and query agent/task logs"
    },
    {
      "name": "Stats",
      "description": "Aggregated dashboard statistics"
    },
    {
      "name": "Settings",
      "description": "Application settings management"
    },
    {
      "name": "Updates",
      "description": "Application auto-update lifecycle"
    }
  ],
  "components": {
    "securitySchemes": {
      "bearerAuth": {
        "type": "http",
        "scheme": "bearer",
        "bearerFormat": "JWT",
        "description": "Session token obtained from POST /auth/login"
      }
    },
    "schemas": {
      "Agent": {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "example": "agent-1"
          },
          "name": {
            "type": "string",
            "example": "claude-dev"
          },
          "type": {
            "type": "string",
            "enum": [
              "claude",
              "codex",
              "gemini",
              "opencode",
              "cursor",
              "custom"
            ],
            "example": "claude"
          },
          "status": {
            "type": "string",
            "enum": [
              "idle",
              "running",
              "spawning",
              "error",
              "stopped"
            ],
            "example": "idle"
          },
          "command": {
            "type": "string",
            "nullable": true,
            "example": "claude --print"
          },
          "execPath": {
            "type": "string",
            "nullable": true,
            "example": "/usr/local/bin/claude"
          },
          "cwd": {
            "type": "string",
            "nullable": true,
            "example": "/project"
          },
          "createdAt": {
            "type": "number",
            "example": 1716900000000
          },
          "updatedAt": {
            "type": "number",
            "example": 1716900000000
          }
        }
      },
      "Goal": {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "example": "goal-1"
          },
          "title": {
            "type": "string",
            "example": "Ship MVP"
          },
          "description": {
            "type": "string",
            "nullable": true,
            "example": "Launch the minimum viable product"
          },
          "status": {
            "type": "string",
            "enum": [
              "active",
              "completed",
              "archived"
            ],
            "example": "active"
          },
          "taskIds": {
            "type": "array",
            "items": {
              "type": "string"
            },
            "example": [
              "task-1",
              "task-2"
            ]
          },
          "createdAt": {
            "type": "number",
            "example": 1716900000000
          },
          "updatedAt": {
            "type": "number",
            "example": 1716900000000
          }
        }
      },
      "Task": {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "example": "task-1"
          },
          "title": {
            "type": "string",
            "example": "Implement auth"
          },
          "description": {
            "type": "string",
            "nullable": true,
            "example": "Add JWT-based auth flow"
          },
          "status": {
            "type": "string",
            "enum": [
              "pending",
              "assigned",
              "running",
              "done",
              "failed",
              "blocked"
            ],
            "example": "pending"
          },
          "goalId": {
            "type": "string",
            "nullable": true,
            "example": "goal-1"
          },
          "assigneeAgentId": {
            "type": "string",
            "nullable": true,
            "example": "agent-1"
          },
          "createdAt": {
            "type": "number",
            "example": 1716900000000
          },
          "updatedAt": {
            "type": "number",
            "example": 1716900000000
          }
        }
      },
      "Dag": {
        "type": "object",
        "description": "DAG workflow summary (without task details)",
        "properties": {
          "id": {
            "type": "string",
            "example": "dag-1"
          },
          "name": {
            "type": "string",
            "example": "deploy-pipeline"
          },
          "description": {
            "type": "string",
            "nullable": true,
            "example": "CI/CD deployment workflow"
          },
          "status": {
            "type": "string",
            "enum": [
              "pending",
              "running",
              "succeeded",
              "failed",
              "cancelled",
              "paused"
            ],
            "example": "pending"
          },
          "taskCount": {
            "type": "number",
            "example": 4
          },
          "createdAt": {
            "type": "number",
            "example": 1716900000000
          },
          "updatedAt": {
            "type": "number",
            "example": 1716900000000
          }
        }
      },
      "DagFull": {
        "type": "object",
        "description": "Full DAG definition with task nodes, edges, and configuration",
        "properties": {
          "id": {
            "type": "string",
            "example": "dag-1"
          },
          "name": {
            "type": "string",
            "example": "deploy-pipeline"
          },
          "description": {
            "type": "string",
            "nullable": true
          },
          "status": {
            "type": "string",
            "enum": [
              "pending",
              "running",
              "succeeded",
              "failed",
              "cancelled",
              "paused"
            ]
          },
          "tasks": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/DagTask"
            }
          },
          "edges": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "from": {
                  "type": "string"
                },
                "to": {
                  "type": "string"
                }
              }
            }
          },
          "maxParallel": {
            "type": "number",
            "example": 2
          },
          "retryMax": {
            "type": "number",
            "example": 3
          },
          "retryBackoffMs": {
            "type": "number",
            "example": 1000
          },
          "retryBackoffMult": {
            "type": "number",
            "example": 2
          },
          "retryMaxBackoffMs": {
            "type": "number",
            "example": 30000
          },
          "onFailure": {
            "type": "string",
            "enum": [
              "fail-fast",
              "best-effort"
            ]
          },
          "createdAt": {
            "type": "number"
          },
          "updatedAt": {
            "type": "number"
          }
        }
      },
      "DagTask": {
        "type": "object",
        "description": "A single task node within a DAG",
        "properties": {
          "id": {
            "type": "string",
            "example": "dag-task-1"
          },
          "title": {
            "type": "string",
            "example": "Build"
          },
          "taskType": {
            "type": "string",
            "enum": [
              "agent",
              "noop",
              "manual"
            ],
            "example": "agent"
          },
          "status": {
            "type": "string",
            "enum": [
              "pending",
              "running",
              "succeeded",
              "failed",
              "cancelled"
            ],
            "example": "pending"
          },
          "agentId": {
            "type": "string",
            "nullable": true
          },
          "output": {
            "type": "object",
            "nullable": true
          },
          "startedAt": {
            "type": "number",
            "nullable": true
          },
          "endedAt": {
            "type": "number",
            "nullable": true
          }
        }
      },
      "LogEntry": {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "example": "log-1"
          },
          "agentId": {
            "type": "string",
            "nullable": true,
            "example": "agent-1"
          },
          "taskId": {
            "type": "string",
            "nullable": true
          },
          "message": {
            "type": "string",
            "example": "Agent started successfully"
          },
          "level": {
            "type": "string",
            "enum": [
              "debug",
              "info",
              "warn",
              "error"
            ],
            "example": "info"
          },
          "stream": {
            "type": "string",
            "enum": [
              "stdout",
              "stderr"
            ],
            "example": "stdout"
          },
          "timestamp": {
            "type": "number",
            "example": 1717000000000
          }
        }
      },
      "Error": {
        "type": "object",
        "properties": {
          "ok": {
            "type": "boolean",
            "example": false
          },
          "error": {
            "type": "object",
            "properties": {
              "code": {
                "type": "string",
                "example": "VALIDATION_ERROR"
              },
              "message": {
                "type": "string",
                "example": "name is required"
              },
              "status": {
                "type": "number",
                "example": 422
              },
              "field": {
                "type": "string",
                "example": "name"
              }
            }
          }
        }
      }
    }
  },
  "paths": {
    "/auth/login": {
      "post": {
        "summary": "Create a session",
        "description": "Creates a new authenticated session with the requested role and returns a bearer token. Roles: `admin` (full access), `operator` (agent/task ops), `viewer` (read-only). If no role is specified, defaults to `operator`.",
        "operationId": "auth_login",
        "tags": [
          "Auth"
        ],
        "x-ipc-channel": "auth:login",
        "x-transport": "ipc",
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "role": {
                    "type": "string",
                    "enum": [
                      "admin",
                      "operator",
                      "viewer"
                    ],
                    "description": "Session role (default: operator)"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "token": {
                      "type": "string",
                      "description": "Bearer token for subsequent requests",
                      "example": "tok_a1b2c3d4e5"
                    },
                    "role": {
                      "type": "string",
                      "enum": [
                        "admin",
                        "operator",
                        "viewer"
                      ],
                      "example": "operator"
                    },
                    "expiresAt": {
                      "type": "number",
                      "description": "Token expiration timestamp (ms since epoch)",
                      "example": 1717000000000
                    }
                  }
                },
                "examples": {
                  "default": {
                    "summary": "Success",
                    "value": {
                      "token": "tok_a1b2c3d4e5",
                      "role": "operator",
                      "expiresAt": 1717000000000
                    }
                  }
                }
              }
            }
          },
          "422": {
            "description": "Validation error"
          }
        }
      }
    },
    "/auth/status": {
      "get": {
        "summary": "Check session validity",
        "description": "Returns the current session info if the token is still valid, otherwise `{ isValid: false }`.",
        "operationId": "auth_status",
        "tags": [
          "Auth"
        ],
        "x-ipc-channel": "auth:status",
        "x-transport": "ipc",
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "isValid": {
                      "type": "boolean",
                      "example": true
                    },
                    "token": {
                      "type": "string",
                      "example": "tok_a1b2c3d4e5"
                    },
                    "role": {
                      "type": "string",
                      "example": "operator"
                    },
                    "expiresAt": {
                      "type": "number",
                      "example": 1717000000000
                    },
                    "createdAt": {
                      "type": "number",
                      "example": 1716900000000
                    }
                  }
                },
                "examples": {
                  "default": {
                    "summary": "Success",
                    "value": {
                      "isValid": true,
                      "token": "tok_a1b2c3d4e5",
                      "role": "operator",
                      "expiresAt": 1717000000000,
                      "createdAt": 1716900000000
                    }
                  }
                }
              }
            }
          }
        }
      }
    },
    "/auth/logout": {
      "post": {
        "summary": "Destroy session",
        "description": "Destroys the current authenticated session and invalidates the token.",
        "operationId": "auth_logout",
        "tags": [
          "Auth"
        ],
        "x-ipc-channel": "auth:logout",
        "x-transport": "ipc",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "ok": {
                      "type": "boolean",
                      "example": true
                    }
                  }
                },
                "examples": {
                  "default": {
                    "summary": "Success",
                    "value": {
                      "ok": true
                    }
                  }
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized — invalid or missing token"
          }
        }
      }
    },
    "/auth/rotate": {
      "post": {
        "summary": "Rotate session token",
        "description": "Rotates the current session token. The old token is immediately invalidated and a fresh one is returned.",
        "operationId": "auth_rotate",
        "tags": [
          "Auth"
        ],
        "x-ipc-channel": "auth:rotate",
        "x-transport": "ipc",
        "security": [
          {
            "bearerAuth": []
          }
        ],
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "token": {
                      "type": "string",
                      "example": "tok_f6g7h8i9j0"
                    },
                    "role": {
                      "type": "string",
                      "example": "operator"
                    },
                    "expiresAt": {
                      "type": "number",
                      "example": 1717100000000
                    }
                  }
                },
                "examples": {
                  "default": {
                    "summary": "Success",
                    "value": {
                      "token": "tok_f6g7h8i9j0",
                      "role": "operator",
                      "expiresAt": 1717100000000
                    }
                  }
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized — invalid or missing token"
          }
        }
      }
    },
    "/health": {
      "get": {
        "summary": "Public health check",
        "description": "Public endpoint (no auth required) returning application health status including uptime, memory, system info, IPC metrics, renderer stats, DB connectivity, and active alerts. Returns HTTP 200 for ok/degraded, 503 for unhealthy.",
        "operationId": "health_check",
        "tags": [
          "Monitoring"
        ],
        "x-ipc-channel": "health:check",
        "x-transport": "ipc",
        "responses": {
          "200": {
            "description": "Success",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "status": {
                      "type": "string",
                      "enum": [
                        "ok",
                        "degraded",
                        "unhealthy"
                      ],
                      "example": "ok"
                    },
                    "version": {
                      "type": "string",
                      "example": "1.0.0"
                    },
                    "ts": {
                      "type": "string",
                      "format": "date-time",
                      "example": "2026-05-28T12:00:00.000Z"
                    },
                    "uptimeMs": {
                      "type": "number",
                      "example": 3600000
                    },
                    "memory": {
                      "type": "object",
                      "properties": {
                        "rss": {
                          "type": "number",
                          "example": 120000000
                        },
                        "heapUsed": {
                          "type": "number",
                          "example": 60000000
                        },
                        "heapTotal": {
                          "type": "number",
                          "example": 100000000
                        },
                        "external": {
                          "type": "number",
                          "example": 5000000
                        }
                      }
                    },
                    "system": {
                      "type": "object",
                      "properties": {
                        "totalMem": {
                          "type": "number",
                          "example": 17179869184
                        },
                        "freeMem": {
                          "type": "number",
                          "example": 8589934592
                        },
                        "loadAvg": {
                          "type": "array",
                          "items": {
                            "type": "number"
                          },
                          "minItems": 3,
                          "maxItems": 3,
                          "example": [
                            1.5,
                            1.2,
                            1
                          ]
                        },
                        "cpus": {
                          "type": "number",
                          "example": 8
                        }
                      }
                    },
                    "ipc": {
                      "type": "object",
                      "properties": {
                        "calls": {
                          "type": "number",
                          "example": 1523
                        },
                        "errors": {
                          "type": "number",
                          "example": 2
                        },
                        "avgLatencyMs": {
                          "type": "number",
                          "example": 4.2
                        }
                      }
                    },
                    "renderer": {
                      "type": "object",
                      "properties": {
                        "crashes": {
                          "type": "number",
                          "example": 0
                        },
                        "unresponsive": {
                          "type": "number",
                          "example": 0
                        }
                      }
                    },
                    "app": {
                      "type": "object",
                      "properties": {
                        "startedAt": {
                          "type": "number",
                          "example": 1716900000000
                        },
                        "uncaughtExceptions": {
                          "type": "number",
                          "example": 0
                        },
                        "unhandledRejections": {
                          "type": "number",
                          "example": 0
                        }
                      }
                    },
                    "db": {
                      "type": "object",
                      "properties": {
                        "ok": {
                          "type": "boolean",
                          "example": true
                        },
                        "error": {
                          "type": "string",
                          "description": "Present only when ok is false"
                        }
                      }
                    },
                    "alerts": {
                      "type": "array",
                      "items": {
                        "type": "object",
                        "properties": {
                          "id": {
                            "type": "string",
                            "example": "high_heap"
                          },
                          "severity": {
                            "type": "string",
                            "enum": [
                              "warn",
                              "error"
                            ]
                          },
                          "detail": {
                            "type": "string"
                          }
                        }
                      },
                      "example": []
                    },
                    "uptime": {
                      "type": "object",
                      "properties": {
                        "uptimePercent": {
                          "type": "number",
                          "example": 99.95,
                          "description": "Percentage of time in ok or degraded status"
                        },
                        "totalUptimeMs": {
                          "type": "number",
                          "example": 86400000
                        },
                        "totalDowntimeMs": {
                          "type": "number",
                          "example": 43200
                        },
                        "breakdown": {
                          "type": "object",
                          "properties": {
                            "okMs": {
                              "type": "number"
                            },
                            "degradedMs": {
                              "type": "number"
                            },
                            "unhealthyMs": {
                              "type": "number"
                            }
                          }
                        },
                        "lastStatusChange": {
                          "type": "string",
                          "enum": [
                            "ok",
                            "degraded",
                            "unhealthy"
                          ]
                        },
                        "lastStatusChangeAt": {
